<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 class="main-heading">Login Now</h1>

        <label>
            Email:
            <input type="email" id="email2" required>
        </label>
        <br>

        <label>
            Password:
            <input type="password" id="password2" required>
        </label>
        <br>

        <button class="start-btn" onclick="loginanother()">Login</button>

        <h2 class="login-heading">Or login with</h2>

        <div class="social-login">

            <button class="google-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                Login with Google
            </button>

            <button class="facebook-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
                Login with Facebook
            </button>

        </div>

        <h2 class="login-heading">Don't have an account ?</h2>

        <button class="start-btn" onclick="signanother()">Sign Up</button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>

</body>

</html>
