<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posteura</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg ">
  <div class="container-fluid d-flex justify-content-between">

    <a class="navbar-brand" href="#">Posteura</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

  
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link active" href="home.html">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Settings</a>
      </li>
    </ul>

    <div class="d-flex">
      <input class="form-control me-2" type="search"id="searchInput" placeholder="Search">
      <button class="btn" type="submit" onclick="searchbtn()" >Search</button>
    </div>

  </div>
</nav>

<div class="container-1">
  <div class="row">
    <div class="card p-3 m-2">

      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" id="title">
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="3"></textarea>
      </div>

      <div class="mb-3 d-flex justify-content-around">
        <img src="img/img1.webp" class="cardimg" onclick="select('img/img1.webp', this)">
        <img src="img/img2.avif" class="cardimg" onclick="select('img/img2.avif', this)">
        <img src="img/img3.jpg" class="cardimg" onclick="select('img/img3.jpg', this)">
        <img src="img/img4.webp" class="cardimg" onclick="select('img/img4.webp', this)">
      </div>

      <button class="start-btn" onclick="post()">Post</button>

    </div>
  </div>

  <div class="col-sm-12 col-md-6 col-lg-8">
    <div id="posts" class="posts m-2"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
