<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 class="main-heading">Create Account</h1>

        <label>
            Username:
            <input type="text" id="fname" required>
        </label>
        <br>

        <label>
            Email:
            <input type="email" id="email" required>
        </label>
        <br>

        <label>
            Password:
            <input type="password" id="password" required>
        </label>
        <br>
        <label>
            Phone:
            <input type="number" id="Phone" required>
        </label>
        <br>

        <button class="start-btn" onclick="login()">Sign Up</button>

        <h2 class="login-heading">Already have an account?</h2>

        <button class="start-btn" onclick="location.href='login.html'">Login</button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>

</body>

</html>
